<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeGroat Family Wishlist</title>
    <style>
        :root {
            --bg-color: #0b0b0b;
            --card-bg: #161616;
            --accent-glow: #ff2e2e;
            --text-color: #ffffff;
            --secondary-text: #ff4d4d;
            --border-color: #2e7d32;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 { font-size: 2.5rem; margin-bottom: 5px; }

        .countdown-header {
            color: #ccc;
            margin-bottom: 40px;
            font-style: italic;
        }

        .wishlist-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .person-card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 2px solid transparent;
            box-shadow: 0 0 10px rgba(255, 46, 46, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .person-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 20px var(--accent-glow);
            border-color: var(--accent-glow);
        }

        .profile-pic-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            border: 3px solid var(--border-color);
            border-radius: 50%;
            overflow: hidden;
            background: #222; /* Placeholder color */
        }

        .profile-pic-container img { width: 100%; height: 100%; object-fit: cover; }

        h2 { margin: 10px 0; font-size: 1.5rem; }

        .birthday-info { margin-bottom: 20px; font-size: 0.9rem; min-height: 45px; }

        .days-left {
            color: var(--secondary-text);
            font-weight: bold;
            display: block;
            margin-top: 5px;
        }

        .button-group { display: flex; flex-direction: column; gap: 8px; }

        .btn {
            display: block;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 0.9rem;
            color: white;
            transition: opacity 0.2s;
        }

        .btn:hover { opacity: 0.8; }
        .amazon-btn { background-color: #ff9900; color: #111; }
        .walmart-btn { background-color: #0071dc; }
    </style>
</head>
<body>

    <h1>Wish List</h1>
    <p class="countdown-header" id="christmas-countdown"></p>

    <div class="wishlist-container">
        <div class="person-card">
            <div class="profile-pic-container"><img src="images/Alex26.jpg" alt="Alexander"></div>
            <h2>Alexander</h2>
            <div class="birthday-info">June 23<span class="days-left" id="days-alexander"></span></div>
            <div class="button-group">
                <a href="https://www.amazon.com/hz/wishlist/ls/2ED58EZS7OCKC?ref_=wl_share" class="btn amazon-btn">Amazon List</a>
                <a href="https://www.walmart.com/lists/birthday-wishlist/66ef4ad2-187e-41b4-9008-1a9e68165a9d" class="btn walmart-btn">Walmart List</a>
            </div>
        </div>

        <div class="person-card">
            <div class="profile-pic-container"><img src="images/Kae26.jpg" alt="Kaelynne"></div>
            <h2>Kaelynne</h2>
            <div class="birthday-info">May 17<span class="days-left" id="days-kaelynne"></span></div>
            <div class="button-group">
                <a href="https://www.amazon.com/hz/wishlist/ls/4AJNA9XIZX61?ref_=wl_share" class="btn amazon-btn">Amazon List</a>
                <a href="https://www.walmart.com/lists/birthday-wishlist/1afa0e17-9be8-478f-b907-24f596046f7d" class="btn walmart-btn">Walmart List</a>
            </div>
        </div>

        <div class="person-card">
            <div class="profile-pic-container"><img src="images/Mathew26.jpg" alt="Mathew"></div>
            <h2>Mathew</h2>
            <div class="birthday-info">July 12<span class="days-left" id="days-mathew"></span></div>
            <div class="button-group">
                <a href="https://www.amazon.com/hz/wishlist/ls/1QCEO70LDGI6A?ref_=wl_share" class="btn amazon-btn">Amazon List</a>
                <a href="https://www.walmart.com/lists/birthday-wishlist/c3961d35-9766-4f56-bf0e-eb43d7848b84" class="btn walmart-btn">Walmart List</a>
            </div>
        </div>

        <div class="person-card">
            <div class="profile-pic-container"><img src="images/Lilah26.jpg" alt="Lilah"></div>
            <h2>Lilah</h2>
            <div class="birthday-info">August 4<span class="days-left" id="days-lilah"></span></div>
            <div class="button-group">
                <a href="https://www.amazon.com/hz/wishlist/ls/2RC1EZS3NDB1M?ref_=wl_share" class="btn amazon-btn">Amazon List</a>
                <a href="https://www.walmart.com/lists/birthday-wishlist/68a62daa-54b1-4ae9-924b-d823129e09a6" class="btn walmart-btn">Walmart List</a>
            </div>
        </div>

        <div class="person-card">
            <div class="profile-pic-container"><img src="images/CND26.jpg" alt="Cura"></div>
            <h2>Cura</h2>
            <div class="birthday-info" id="info-cura">August 1<span class="days-left" id="days-cura"></span></div>
            <div class="button-group">
                <a href="https://www.amazon.com/hz/wishlist/ls/P9PDQUYSDZSH?ref_=wl_fv_le" class="btn amazon-btn">Amazon List</a>
                <a href="#" class="btn walmart-btn">Walmart List</a>
            </div>
        </div>

        <div class="person-card">
            <div class="profile-pic-container"><img src="images/CND26.jpg" alt="Dustin"></div>
            <h2>Dustin</h2>
            <div class="birthday-info" id="info-dustin">July 9<span class="days-left" id="days-dustin"></span></div>
            <div class="button-group">
                <a href="https://www.amazon.com/hz/wishlist/ls/T24B644746MR?ref_=wl_share" class="btn amazon-btn">Amazon List</a>
                <a href="https://www.walmart.com/lists/birthday-wishlist/9f672590-30e9-4fd2-868a-f5bae5b791c7" class="btn walmart-btn">Walmart List</a>
            </div>
        </div>
    </div>

    <script>
        function updateCountdowns() {
            const now = new Date();
            const year = now.getFullYear();

            // Christmas
            const christmas = new Date(year, 11, 25);
            if (now > christmas) christmas.setFullYear(year + 1);
            const diffXmas = Math.ceil((christmas - now) / (1000 * 60 * 60 * 24));
            document.getElementById('christmas-countdown').innerText = `${diffXmas} days until Christmas!`;

            function setDays(id, month, day) {
                if(!month || !day) return;
                let bday = new Date(year, month - 1, day);
                if (now > bday) bday.setFullYear(year + 1);
                let diff = Math.ceil((bday - now) / (1000 * 60 * 60 * 24));
                document.getElementById(id).innerText = `Days until birthday: ${diff}`;
            }

            setDays('days-alexander', 6, 23);
            setDays('days-kaelynne', 5, 17);
            setDays('days-mathew', 7, 12);
            setDays('days-lilah', 8, 4);
            setDays('days-cura', 8, 1);
            setDays('days-dustin', 7, 9);
        }
        updateCountdowns();
    </script>
</body>
</html>
